server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # React Router – všetky cesty presmeruj na index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Statické súbory – dlhé cachovanie
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Zakáž prístup k .env a skrytým súborom
    location ~ /\. {
        deny all;
    }
}
